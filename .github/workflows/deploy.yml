# QOM Baukasten – Build & Deploy zu Infomaniak
# Läuft bei jedem Push auf main: Astro bauen → dist/ per FTP hochladen.
name: Deploy zu Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Seite bauen
        run: npm run build

      - name: Per FTP zu Infomaniak hochladen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./sites/neu.quitordinarymarketing.ch/
