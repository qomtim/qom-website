# QOM Baukasten – Build & Deploy zu Infomaniak
# Läuft bei jedem Push auf main: Astro bauen → dist/ per FTP hochladen.
name: Deploy zu Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Wird von n8n ausgelöst, wenn in Storyblok publiziert wird
  repository_dispatch:
    types: [storyblok-publish]
  schedule:
    # Jede Nacht um 03:15 UTC neu bauen – holt die neusten Storyblok-Inhalte
    - cron: "15 3 * * *"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Seite bauen (Inhalte aus Storyblok, mit Fallback)
        env:
          STORYBLOK_TOKEN: ${{ secrets.STORYBLOK_TOKEN }}
        run: npm run build

      - name: Per FTP zu Infomaniak hochladen (findet Zielordner selbst)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: node scripts/deploy-ftp.mjs
